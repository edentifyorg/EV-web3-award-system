services:
  postgres:
    image: postgres:17
    container_name: neverflat-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: nvf_award
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nvf_award"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  app:
    container_name: neverflat-app
    image: ghcr.io/zentrixlab/neverflat:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '127.0.0.1:3005:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/nvf_award
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - shared-proxy

volumes:
  pgdata:

networks:
  shared-proxy:
    external: true
