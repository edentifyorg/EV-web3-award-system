name: Deploy Neverflat

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy production compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.yaml
          target: /root/neverflat
          strip_components: 0

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          envs: ADMIN_EMAIL,ADMIN_PASSWORD
          script: |
            set -euo pipefail
            cd /root/neverflat
            echo ${{ github.token }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker network create shared-proxy || true
            touch .env
            python3 - <<'PY'
            import os
            from pathlib import Path

            path = Path('.env')
            updates = {
                'ADMIN_EMAIL': os.environ['ADMIN_EMAIL'],
                'ADMIN_PASSWORD': os.environ['ADMIN_PASSWORD'],
            }
            lines = path.read_text().splitlines() if path.exists() else []
            kept = [line for line in lines if not any(line.startswith(f'{key}=') for key in updates)]
            kept.extend(f'{key}={value}' for key, value in updates.items())
            path.write_text('\n'.join(kept) + '\n')
            PY
            docker compose pull app
            docker compose up -d
