name: Mirror Repositories

# Mirrors Zentrix main to the EDENTIFY and personal code-only repositories.
on:
  push:
    branches:
      - main

jobs:
  mirror:
    name: Mirror main to EDENTIFY and personal repositories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Zentrix repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add EDENTIFY remote
        run: |
          git remote add edentify https://x-access-token:${{ secrets.EDENTIFY_MIRROR_PAT }}@github.com/edentifyorg/EV-web3-award-system.git

      - name: Push main to EDENTIFY
        run: |
          git push --force edentify HEAD:main

      - name: Add personal remote
        run: |
          git remote add personal https://x-access-token:${{ secrets.PERSONAL_MIRROR_PAT }}@github.com/DuncanMain/EV-web3-award-system.git

      - name: Push main to personal repository
        run: |
          git push --force personal HEAD:main
