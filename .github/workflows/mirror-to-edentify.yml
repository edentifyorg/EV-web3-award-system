name: Mirror to EDENTIFY

on:
  push:
    branches:
      - main

jobs:
  mirror:
    name: Mirror main to EDENTIFY
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add EDENTIFY remote
        run: |
          git remote add edentify https://x-access-token:${{ secrets.EDENTIFY_MIRROR_PAT }}@github.com/EDENTIFY/Neverflat-award-core.git

      - name: Push main to EDENTIFY
        run: |
          git push --force --set-upstream edentify HEAD:main
