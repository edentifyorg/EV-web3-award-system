version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neverflat-dev-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nvf_award}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    container_name: neverflat-dev
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run api
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    ports:
      - '3000:3000'

volumes:
  pgdata:
